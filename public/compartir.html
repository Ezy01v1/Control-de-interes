<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compartir registro</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container compact">
    <section class="card share-hero">
      <h1>Compartir formulario público</h1>
      <p>Usa este enlace o escanea el QR para abrir el formulario desde cualquier celular.</p>

      <div class="share-box">
        <div>
          <strong>Link público</strong>
          <p id="shareLink" class="share-link"></p>
        </div>
        <div class="share-actions">
          <button type="button" id="copyLinkBtn" class="secondary-btn">Copiar link</button>
          <a href="/qr.html" class="secondary-btn view-qr-btn" target="_blank" rel="noopener noreferrer">Ver código QR</a>
        </div>
      </div>

      <p id="mensaje" class="mensaje" aria-live="polite"></p>
    </section>
  </main>

  <script src="/config.js"></script>
  <script src="/js/share.js"></script>
</body>
</html>
