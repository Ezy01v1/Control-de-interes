<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container dashboard-wrapper">
    <section class="card">
      <div class="dashboard-header">
        <div class="card-header dashboard-title">
          <img src="/img/starchurch.png" alt="North Star" class="brand-mark" />
          <div>
            <h1>Panel de seguimiento</h1>
            <p id="userLabel"></p>
          </div>
        </div>
        <div class="actions">
          <button id="exportBtn" class="secondary-btn">Exportar PDF</button>
          <button id="logoutBtn" class="ghost-btn">Cerrar sesión</button>
        </div>
      </div>

      <div class="share-box dashboard-share-box">
        <div>
          <strong>Link público de registro</strong>
          <p id="shareLink" class="share-link"></p>
        </div>
        <div class="share-actions">
          <button type="button" id="copyLinkBtn" class="secondary-btn">Copiar link</button>
          <a href="/qr.html" class="secondary-btn view-qr-btn" target="_blank" rel="noopener noreferrer">Ver código QR</a>
        </div>
      </div>

      <div class="filters">
        <label>
          Desde
          <input type="date" id="desde" />
        </label>

        <label>
          Hasta
          <input type="date" id="hasta" />
        </label>

        <button id="applyFiltersBtn" class="primary-btn">Aplicar filtros</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Correo</th>
              <th>Código postal</th>
              <th>Edad</th>
              <th>Evento</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="personasTableBody"></tbody>
        </table>
      </div>
      <p id="mensaje" class="mensaje" aria-live="polite"></p>
    </section>
  </main>

  <script src="/config.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
