<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container compact">
    <section class="card">
      <h1>Recuperar contraseña</h1>
      <p class="subtitle">Ingresa tu correo electrónico para recibir un enlace de restablecimiento.</p>

      <form id="forgotForm" class="form-grid">
        <label class="full-width">
          Correo electrónico
          <input type="email" name="email" required />
        </label>

        <button type="submit" class="primary-btn full-width">Enviar enlace</button>
      </form>

      <p id="mensaje" class="mensaje" aria-live="polite"></p>
      <p class="text-link-row">
        <a href="/login.html">Volver al login</a>
      </p>
    </section>
  </main>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
