<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="container compact">
    <section class="card">
      <header class="card-header">
        <img src="/img/starchurch.png" alt="North Star" class="brand-mark" />
        <h1>Restablecer contraseña</h1>
      </header>
      <p class="subtitle">Ingresa tu nueva contraseña para continuar.</p>

      <form id="resetForm" class="form-grid">
        <label class="full-width">
          Nueva contraseña
          <input type="password" name="nuevaPassword" required minlength="6" />
        </label>

        <label class="full-width">
          Confirmar contraseña
          <input type="password" name="confirmPassword" required minlength="6" />
        </label>

        <input type="hidden" name="token" id="tokenInput" />

        <button type="submit" class="primary-btn full-width">Guardar contraseña</button>
      </form>

      <p id="mensaje" class="mensaje" aria-live="polite"></p>
      <p class="text-link-row">
        <a href="/login.html">Volver al login</a>
      </p>
    </section>
  </main>

  <script src="/js/reset-password.js"></script>
</body>
</html>
